services:
  database:
    image: postgres:16-alpine
    env_file:
      - ./DataBase/postgres.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./Backend
    env_file:
      - ./Backend/.env
    environment:
      - DATABASE_URL=postgresql://app:app@database:5432/chatdb?schema=public
      - CORS_ORIGIN=http://localhost:5173
    ports:
      - "3001:3001"
    volumes:
      - ./Backend:/app
      - /app/node_modules
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - database

  frontend:
    build:
      context: ./Frontend
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend


volumes:
  pgdata:
